<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 Weather Station</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <main>
    <section class="dashboard" aria-label="Weather dashboard">
      <header class="top">
        <div class="location-heading">
          <p class="label location-label">Selected Location</p>
          <select class="location-title-select" id="location-select" aria-label="Saved spot">
            <option value="">Loading locations...</option>
          </select>
          <div class="spot-actions">
            <button class="secondary-button small-button" id="add-location-toggle" type="button">Add new spot</button>
            <button class="secondary-button small-button" id="remove-location-toggle" type="button">Remove spot</button>
          </div>
          <span class="status" id="status">Loading latest reading...</span>
        </div>
        <div class="time">
          <p class="label">Local Time</p>
          <strong id="time">--:--</strong>
          <span id="date">Loading date...</span>
        </div>
      </header>

      <section class="location-panel is-hidden" id="location-panel" aria-label="Add location">
        <form class="location-form" id="location-form">
          <div class="field-group">
            <label for="location-nickname">Nickname</label>
            <input id="location-nickname" name="nickname" placeholder="Desk" autocomplete="off">
          </div>
          <div class="field-group">
            <label for="location-value">Location</label>
            <input id="location-value" name="location" placeholder="Redwood City" autocomplete="off">
          </div>
          <div class="location-actions">
            <button class="secondary-button" id="cancel-location" type="button">Cancel</button>
            <button class="primary-button" type="submit">Save spot</button>
          </div>
        </form>
      </section>

      <section class="location-panel is-hidden" id="remove-location-panel" aria-label="Remove location">
        <form class="remove-location-form" id="remove-location-form">
          <div class="field-group">
            <label for="remove-location-select">Spot to delete</label>
            <select id="remove-location-select" name="location_id">
              <option value="">Loading locations...</option>
            </select>
          </div>
          <div class="location-actions">
            <button class="secondary-button" id="cancel-remove-location" type="button">Cancel</button>
            <button class="danger-button" type="submit">Delete spot</button>
          </div>
        </form>
      </section>

      <section class="grid" aria-label="Current readings">
        <article class="metric warm">
          <div>
            <p class="label">Outdoor Temp</p>
            <strong id="outdoor-temp">--</strong>
          </div>
          <small id="outdoor-note">Waiting for weather data</small>
        </article>

        <article class="metric accent">
          <div>
            <p class="label">Indoor Temp</p>
            <strong id="indoor-temp">--</strong>
          </div>
          <small>ESP32 sensor reading</small>
        </article>

        <article class="metric">
          <div>
            <p class="label">Indoor Humidity</p>
            <strong id="indoor-humidity">--</strong>
          </div>
          <small>ESP32 sensor reading</small>
        </article>
      </section>

      <section class="chart-panel" aria-label="Indoor and outdoor temperature over the past 12 hours">
        <div class="chart-header">
          <div>
            <p class="label">Temperature History</p>
            <h2 id="chart-title">Past 12 hours</h2>
          </div>
          <div class="chart-tools">
            <div class="legend" aria-label="Chart legend">
              <span><i class="legend-dot indoor"></i>Indoor</span>
              <span><i class="legend-dot outdoor"></i>Outdoor</span>
            </div>
            <button class="chart-reset is-hidden" id="chart-reset" type="button">Reset</button>
          </div>
        </div>
        <div class="chart-readout" id="chart-readout"></div>
        <div class="chart-wrap">
          <canvas id="temperature-chart"></canvas>
          <p class="chart-empty" id="chart-empty">Loading chart...</p>
        </div>
        <a class="history-link" href="/weather-history">View all readings</a>
      </section>
    </section>
  </main>

  <script src="/static/dashboard.js"></script>
</body>
</html>
