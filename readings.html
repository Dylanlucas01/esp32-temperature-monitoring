<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 Weather Station Readings</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <main>
    <section class="dashboard" aria-label="Weather readings">
      <header class="top">
        <div>
          <h1>All Readings</h1>
          <span class="status" id="readings-status">Loading saved readings...</span>
        </div>
        <div class="time">
          <a class="nav-link" href="/">Back to dashboard</a>
        </div>
      </header>

      <section class="readings-panel standalone" aria-label="Temperature readings">
        <div class="readings-header">
          <div>
            <p class="label">History</p>
            <h2>Sensor Readings</h2>
          </div>
          <div class="readings-tools">
            <div class="field-group spot-filter">
              <label for="readings-location-select">Spot</label>
              <select id="readings-location-select">
                <option value="">All spots</option>
              </select>
            </div>
            <span id="readings-count">Loading...</span>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col"><button class="sort-button" data-sort-by="id" type="button">Index</button></th>
                <th scope="col"><button class="sort-button is-active" data-sort-by="recorded_at" type="button">Recorded At</button></th>
                <th scope="col">Spot</th>
                <th scope="col"><button class="sort-button" data-sort-by="inside_temperature" type="button">Indoor Temp</button></th>
                <th scope="col"><button class="sort-button" data-sort-by="inside_humidity" type="button">Indoor Humidity</button></th>
                <th scope="col"><button class="sort-button" data-sort-by="outside_temperature" type="button">Outdoor Temp</button></th>
                <th scope="col"><button class="sort-button" data-sort-by="outside_humidity" type="button">Outdoor Humidity</button></th>
              </tr>
            </thead>
            <tbody id="readings-table-body">
              <tr>
                <td colspan="7" class="empty-cell">Loading readings...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination" aria-label="Readings pagination"></div>
      </section>
    </section>
  </main>

  <script src="/static/readings.js"></script>
</body>
</html>
